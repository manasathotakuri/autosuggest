<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Being Infinity</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .settings {
            font-size: 28px;
            cursor: pointer;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }

        /* Main Content */
        .container {
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 15px;
        }

        p {
            font-size: 22px;
            margin-bottom: 35px;
        }

        /* Search Box */
        .search-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            width: 350px;
            padding: 12px 15px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #0078d7;
        }

        .search-icon {
            font-size: 22px;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">

        <!-- Left -->
        <div class="settings">
            &#9881;
        </div>

        <!-- Right -->
        <div class="status">
            <span>&#8226; Online |</span>
            <span>&#128339;</span>
            <span>0 ms</span>
        </div>

    </div>

    <!-- Main Content -->
    <div class="container">

        <h1>Being Infinity</h1>

        <p>
            One million phrases. Four algorithms. Prefix Based Auto Suggest.
        </p>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Start typing to search...">
        </div>

    </div>

</body>
</html>
